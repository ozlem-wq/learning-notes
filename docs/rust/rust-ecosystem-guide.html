                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                          <span style={{ fontSize: 11, color: "#ff6b6b", background: "rgba(255,107,107,0.1)", padding: "2px 7px", borderRadius: 4 }}>{a.from}</span>
                          <span style={{ fontSize: 11, color: "#6a7394" }}>→</span>
                          <span style={{ fontSize: 11, color: "#00ff7f", background: "rgba(0,255,127,0.1)", padding: "2px 7px", borderRadius: 4, fontWeight: 600 }}>{a.to}</span>
                        </div>
                        <div style={{ fontSize: 11, color: "#8892b0", lineHeight: 1.5, marginBottom: 4 }}>
                          <span style={{ color: "#ff6b6b", fontWeight: 600 }}>Neden: </span>{a.why}
                        </div>
                        <div style={{ fontSize: 11, color: "#8892b0", lineHeight: 1.5 }}>
                          <span style={{ color: "#00ff7f", fontWeight: 600 }}>Sonuç: </span>{a.result}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {section.id === "future" && section.points && section.points.length > 0 && (
                  <div style={{ marginTop: 14, background: "rgba(168,85,247,0.06)", border: "1px solid rgba(168,85,247,0.15)", borderRadius: 10, padding: "14px 16px" }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#a855f7", marginBottom: 8 }}>📌 Özet: Rust'ın Geleceği Neden Parlak?</div>
                    <div style={{ fontSize: 12, color: "#8892b0", lineHeight: 1.7 }}>
                      Büyük şirket desteği (Rust Foundation) + devlet önerisi (NSA/CISA) + Linux kernel entegrasyonu + WASM büyümesi + yıllık %40 GitHub büyüme = Rust'ın 10+ yıl boyunca güçlü kalacağının güçlü sinyalleri. Öğrenme yatırımı geri dönecektir.
                    </div>
                  </div>
                )}

                {section.weaknesses && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {section.weaknesses.map((w, i) => (
                      <div key={i} style={{ background: "rgba(255,107,107,0.025)", border: "1px solid rgba(255,107,107,0.1)", borderRadius: 10, padding: "14px 16px", borderLeft: `3px solid ${section.color}50` }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#ff6b6b", marginBottom: 5 }}>❌ {w.problem}</div>
                        <div style={{ fontSize: 12, color: "#6a7394", lineHeight: 1.5, marginBottom: 8 }}>{w.detail}</div>
                        <div style={{ background: "rgba(0,255,127,0.04)", border: "1px solid rgba(0,255,127,0.1)", borderRadius: 7, padding: "9px 12px", marginBottom: 5 }}>
                          <div style={{ fontSize: 10, color: "#00ff7f", fontWeight: 700, marginBottom: 3, letterSpacing: "0.5px" }}>💡 KOMBİNASYON TAVSİYESİ</div>
                          <div style={{ fontSize: 11.5, color: "#a8b2d1", lineHeight: 1.55 }}>{w.combo}</div>
                        </div>
                        <div style={{ fontSize: 10.5, color: "#4a5580" }}><span style={{ color: "#06b6d4" }}>🔧</span> {w.tools}</div>
                      </div>
                    ))}
                  </div>
                )}

                {section.scenarios && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                    {section.scenarios.map((s, i) => (
                      <div key={i} style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.04)", borderRadius: 9, padding: "10px 14px", display: "flex", gap: 10, alignItems: "flex-start" }}>
                        <span style={{ fontSize: 11.5, fontWeight: 700, color: s.verdict.includes("✅") ? "#00ff7f" : s.verdict.includes("⚠️") ? "#ffd93d" : "#ff6b6b", whiteSpace: "nowrap", minWidth: 100 }}>{s.verdict}</span>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 12.5, fontWeight: 600, color: "#e0ddd5" }}>{s.scenario}</div>
                          <div style={{ fontSize: 11, color: "#6a7394", marginTop: 2, lineHeight: 1.45 }}>{s.reason}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* CATEGORY */}
        {isCategory && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
              <span style={{ fontSize: 24 }}>{isCategory.icon}</span>
              <div>
                <h2 style={{ fontSize: 19, color: isCategory.color, margin: 0, fontWeight: 700 }}>{isCategory.title}</h2>
                <span style={{ fontSize: 11, color: "#6a7394" }}>{isCategory.subtitle}</span>
              </div>
            </div>
            {isCategory.benchmark && (
              <div style={{ background: isCategory.color + "0a", border: `1px solid ${isCategory.color}1a`, borderRadius: 7, padding: "8px 13px", margin: "10px 0 14px", fontSize: 11.5, color: "#8892b0", lineHeight: 1.5 }}>
                <span style={{ color: isCategory.color, fontWeight: 700 }}>📊 </span>{isCategory.benchmark}
              </div>
            )}
            <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
              {isCategory.items.map((item) => (
                <div key={item.name} style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 9, padding: "12px 14px", borderLeft: `3px solid ${isCategory.color}40` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 5 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                      <span style={{ fontSize: 14, fontWeight: 700, color: "#e0ddd5" }}>{item.name}</span>
                      {item.stars && <span style={{ fontSize: 9.5, color: "#4a5580", background: "rgba(255,255,255,0.04)", padding: "1px 5px", borderRadius: 3 }}>⭐{item.stars}</span>}
                    </div>
                    <span style={{ fontSize: 10.5, color: isCategory.color, fontWeight: 600 }}>{item.status}</span>
                  </div>
                  <p style={{ fontSize: 12, color: "#8892b0", margin: "5px 0 0", lineHeight: 1.55 }}>{item.desc}</p>
                  {item.useCase && <div style={{ marginTop: 5, fontSize: 10.5, color: "#4a5580" }}><span style={{ color: isCategory.color }}>→</span> {item.useCase}</div>}
                </div>
              ))}
            </div>
            {/* AI/ML Extra: Comparison Table + Pipeline */}
            {isCategory.aiExtra && (
              <div style={{ marginTop: 16 }}>
                <TableComponent data={isCategory.aiExtra.comparison} />
                <div style={{ marginTop: 16 }}>
                  <h4 style={{ fontSize: 13, color: "#06b6d4", margin: "0 0 10px", fontWeight: 700 }}>🔄 Önerilen AI/ML Pipeline</h4>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                    {isCategory.aiExtra.pipeline.map((p, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, background: "rgba(6,182,212,0.04)", border: "1px solid rgba(6,182,212,0.1)", borderRadius: 7, padding: "8px 12px" }}>
                        <span style={{ fontSize: 11, color: "#06b6d4", fontWeight: 700, minWidth: 80 }}>{p.phase}</span>
                        <span style={{ fontSize: 12, color: "#e0ddd5", fontWeight: 600, minWidth: 140 }}>{p.tool}</span>
                        <span style={{ fontSize: 11, color: "#6a7394" }}>{p.note}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* STACKS */}
        {isStacks && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <span style={{ fontSize: 28 }}>🎯</span>
              <div>
                <h2 style={{ fontSize: 21, color: "#00ff7f", margin: 0, fontWeight: 800 }}>Sana Özel Stack Kombinasyonları</h2>
                <span style={{ fontSize: 11, color: "#6a7394" }}>Senaryoya göre hazır paket önerileri</span>
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {stacks.map((stack, idx) => {
                const exp = expandedStack === idx;
                return (
                  <div key={idx} style={{ background: "rgba(255,255,255,0.015)", border: `1px solid ${exp ? stack.tagColor + "44" : "rgba(255,255,255,0.05)"}`, borderRadius: 11, overflow: "hidden", transition: "border-color 0.2s" }}>
                    <div onClick={() => setExpandedStack(exp ? null : idx)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", cursor: "pointer", background: exp ? stack.tagColor + "08" : "transparent" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontSize: 18 }}>{stack.name.split(" ")[0]}</span>
                        <div>
                          <div style={{ fontSize: 14, fontWeight: 700, color: "#e0ddd5" }}>{stack.name.substring(stack.name.indexOf(" ") + 1)}</div>
                          <div style={{ fontSize: 11, color: "#6a7394", marginTop: 1 }}>{stack.desc}</div>
                        </div>
                      </div>
                      <span style={{ background: stack.tagColor + "22", color: stack.tagColor, padding: "4px 10px", borderRadius: 5, fontSize: 10.5, fontWeight: 600 }}>{stack.tag}</span>
                    </div>
                    {exp && (
                      <div style={{ padding: "0 16px 16px" }}>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 6, marginBottom: 12 }}>
                          {stack.layers.map((l, i) => (
                            <div key={i} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", borderRadius: 7, padding: "8px 10px" }}>
                              <div style={{ fontSize: 9, color: "#4a5580", textTransform: "uppercase", letterSpacing: "0.5px" }}>{l.role}</div>
                              <div style={{ fontSize: 12, color: stack.tagColor, fontWeight: 600, marginTop: 2 }}>{l.tool}</div>
                              <div style={{ fontSize: 10, color: "#6a7394", marginTop: 1 }}>{l.note}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                          <div style={{ flex: "1 1 200px", background: "rgba(0,255,127,0.04)", border: "1px solid rgba(0,255,127,0.1)", borderRadius: 7, padding: "8px 12px" }}>
                            <div style={{ fontSize: 10, color: "#00ff7f", fontWeight: 700 }}>✅ Avantaj</div>
                            <div style={{ fontSize: 11, color: "#8892b0", marginTop: 2 }}>{stack.pros}</div>
                          </div>
                          <div style={{ flex: "1 1 200px", background: "rgba(255,107,107,0.04)", border: "1px solid rgba(255,107,107,0.1)", borderRadius: 7, padding: "8px 12px" }}>
                            <div style={{ fontSize: 10, color: "#ff6b6b", fontWeight: 700 }}>⚠️ Dikkat</div>
                            <div style={{ fontSize: 11, color: "#8892b0", marginTop: 2 }}>{stack.cons}</div>
                          </div>
                          <div style={{ flex: "1 1 200px", background: "rgba(6,182,212,0.04)", border: "1px solid rgba(6,182,212,0.1)", borderRadius: 7, padding: "8px 12px" }}>
                            <div style={{ fontSize: 10, color: "#06b6d4", fontWeight: 700 }}>🎯 İdeal</div>
                            <div style={{ fontSize: 11, color: "#8892b0", marginTop: 2 }}>{stack.ideal}</div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* GAME DEV */}
        {isGame && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
              <span style={{ fontSize: 24 }}>🎮</span>
              <div>
                <h2 style={{ fontSize: 19, color: "#7b68ee", margin: 0, fontWeight: 700 }}>Bonus: Game Dev</h2>
                <span style={{ fontSize: 11, color: "#6a7394" }}>Rust ile oyun geliştirme (bonus alan)</span>
              </div>
            </div>
            <div style={{ background: "#7b68ee0a", border: "1px solid #7b68ee1a", borderRadius: 7, padding: "8px 13px", margin: "10px 0 14px", fontSize: 11.5, color: "#8892b0", lineHeight: 1.5 }}>
              <span style={{ color: "#7b68ee", fontWeight: 700 }}>📊 </span>Bevy: 37k+ GitHub stars. Rust game dev'in en popüler seçimi.
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
              {gameItems.map((item) => (
                <div key={item.name} style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 9, padding: "12px 14px", borderLeft: "3px solid #7b68ee40" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 5 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                      <span style={{ fontSize: 14, fontWeight: 700, color: "#e0ddd5" }}>{item.name}</span>
                      {item.stars && <span style={{ fontSize: 9.5, color: "#4a5580", background: "rgba(255,255,255,0.04)", padding: "1px 5px", borderRadius: 3 }}>⭐{item.stars}</span>}
                    </div>
                    <span style={{ fontSize: 10.5, color: "#7b68ee", fontWeight: 600 }}>{item.status}</span>
                  </div>
                  <p style={{ fontSize: 12, color: "#8892b0", margin: "5px 0 0", lineHeight: 1.55 }}>{item.desc}</p>
                  {item.useCase && <div style={{ marginTop: 5, fontSize: 10.5, color: "#4a5580" }}><span style={{ color: "#7b68ee" }}>→</span> {item.useCase}</div>}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RustEcosystemGuide />);
  </script>
</body>
</html>
